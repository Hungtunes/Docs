<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sổ tay Kiến thức Cá nhân</title>
    <script src="https://cdn.tailwindcss.com?plugins=typography"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        /* Tùy chỉnh thanh cuộn cho đẹp */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #c7c7cc; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #a1a1aa; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col">

    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50 shadow-sm">
        <div class="max-w-5xl mx-auto px-4 py-3 flex justify-between items-center">
            <button onclick="showView('list')" class="text-xl font-extrabold text-slate-800 flex items-center gap-2 hover:text-blue-600 transition">
                <span class="text-2xl">🧠</span> My Knowledge
            </button>
            <div class="flex gap-3">
                <button onclick="showCreatePost()" class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg font-medium transition text-sm flex items-center gap-2 shadow-sm">
                    <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"></path></svg>
                    Bài viết mới
                </button>
                <button onclick="showView('config')" class="bg-slate-100 hover:bg-slate-200 text-slate-700 px-3 py-2 rounded-lg font-medium transition text-sm flex items-center shadow-sm">
                    ⚙️
                </button>
            </div>
        </div>
    </nav>

    <div id="toast" class="fixed bottom-4 right-4 p-4 rounded-lg text-white font-medium shadow-xl transition-all duration-300 transform translate-y-20 opacity-0 z-50 flex items-center gap-2">
        <span id="toast-icon">ℹ️</span>
        <span id="toast-msg">Thông báo</span>
    </div>

    <main class="flex-grow max-w-5xl mx-auto px-4 py-8 w-full">
        
        <section id="view-config" class="hidden max-w-md mx-auto bg-white p-8 rounded-2xl shadow-sm border border-slate-200 mt-10">
            <div class="text-center mb-6">
                <div class="bg-blue-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4 text-2xl">🔑</div>
                <h2 class="text-2xl font-bold text-slate-800">Cấu hình kết nối</h2>
                <p class="text-sm text-slate-500 mt-2">Dữ liệu được lưu an toàn trên trình duyệt của bạn.</p>
            </div>
            
            <div class="space-y-5">
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Tên Repository</label>
                    <input type="text" id="cfg-repo" placeholder="ví dụ: nguyenvana/my-blog" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <div>
                    <label class="block text-sm font-semibold text-slate-700 mb-1">Personal Access Token</label>
                    <input type="password" id="cfg-token" placeholder="ghp_xxxxxxxxxxxxxxxxxxx" class="w-full p-3 bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-blue-500 outline-none transition">
                </div>
                <button onclick="saveConfig()" class="w-full bg-slate-800 hover:bg-slate-900 text-white font-bold py-3 px-4 rounded-xl transition shadow-md mt-2">
                    Lưu & Kết nối
                </button>
            </div>
        </section>

        <section id="view-list" class="hidden">
            <div class="mb-10 text-center max-w-xl mx-auto mt-4">
                <h1 class="text-3xl font-extrabold text-slate-800 mb-4">Sổ tay của bạn</h1>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-4 text-slate-400">🔍</span>
                    <input type="text" id="searchInput" onkeyup="filterList()" placeholder="Tìm kiếm bài viết..." 
                        class="w-full pl-11 pr-4 py-3 bg-white border border-slate-200 rounded-full focus:outline-none focus:ring-2 focus:ring-blue-500 shadow-sm transition">
                </div>
            </div>
            
            <div id="loading-list" class="text-center py-12 hidden">
                <div class="animate-spin inline-block w-8 h-8 border-4 border-blue-500 border-t-transparent rounded-full mb-2"></div>
                <p class="text-slate-500 font-medium">Đang đồng bộ từ GitHub...</p>
            </div>
            
            <div id="post-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                </div>
        </section>

        <section id="view-read" class="hidden">
            <div class="max-w-3xl mx-auto">
                <div class="flex justify-between items-center mb-6">
                    <button onclick="showView('list')" class="text-slate-500 hover:text-blue-600 font-medium flex items-center gap-2 transition">
                        <span>&larr;</span> Quay lại danh sách
                    </button>
                    <button onclick="showEditPost()" class="bg-amber-100 hover:bg-amber-200 text-amber-700 px-4 py-2 rounded-lg font-semibold transition text-sm flex items-center gap-2">
                        ✏️ Chỉnh sửa
                    </button>
                </div>

                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-8 md:p-12 min-h-[60vh]">
                    <h1 id="read-title" class="text-3xl md:text-4xl font-extrabold text-slate-900 mb-8 pb-6 border-b border-slate-100"></h1>
                    <article id="read-content" class="prose prose-slate prose-blue lg:prose-lg max-w-none prose-headings:font-bold prose-a:text-blue-600">
                        </article>
                </div>
            </div>
        </section>

        <section id="view-edit" class="hidden max-w-4xl mx-auto">
            <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col min-h-[75vh]">
                
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 border-b border-slate-100 pb-6">
                    <div class="w-full md:w-1/2">
                        <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Tên file (.md)</label>
                        <input type="text" id="edit-filename" placeholder="vi-du-bai-viet.md" class="w-full p-2 bg-slate-50 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-slate-700">
                    </div>
                    <div class="flex gap-3 w-full md:w-auto mt-4 md:mt-0">
                        <button onclick="cancelEdit()" class="flex-1 md:flex-none bg-slate-100 hover:bg-slate-200 text-slate-700 px-5 py-2.5 rounded-lg font-medium transition text-sm text-center">
                            Hủy
                        </button>
                        <button onclick="savePostToGitHub()" class="flex-1 md:flex-none bg-emerald-500 hover:bg-emerald-600 text-white px-5 py-2.5 rounded-lg font-medium transition text-sm flex items-center justify-center gap-2 shadow-sm">
                            💾 Lưu lên GitHub
                        </button>
                    </div>
                </div>

                <div class="flex-grow flex flex-col">
                    <label class="block text-xs font-bold text-slate-400 uppercase tracking-wider mb-2">Nội dung Markdown</label>
                    <textarea id="edit-content" class="flex-grow w-full p-5 font-mono text-sm bg-slate-50 border border-slate-200 rounded-xl focus:outline-none focus:ring-2 focus:ring-blue-500 focus:bg-white transition resize-none" placeholder="# Tiêu đề bài viết&#10;&#10;Bắt đầu gõ nội dung của bạn tại đây..."></textarea>
                </div>
            </div>
        </section>

    </main>

    <script>
        // --- BIẾN TOÀN CỤC ---
        let currentPost = { name: '', path: '', sha: '', content: '' };
        let allPosts = []; 

        // Fix lỗi tiếng Việt khi dùng Base64 với Github API
        const b64_to_utf8 = str => decodeURIComponent(escape(window.atob(str.replace(/\s/g, ''))));
        const utf8_to_b64 = str => window.btoa(unescape(encodeURIComponent(str)));

        // --- HỆ THỐNG UI ---
        function showToast(msg, type = 'info') {
            const toast = document.getElementById('toast');
            document.getElementById('toast-msg').innerText = msg;
            
            if(type === 'error') {
                toast.className = "fixed bottom-4 right-4 p-4 rounded-xl text-white font-medium shadow-lg transition-all duration-300 transform translate-y-0 opacity-100 z-50 flex items-center gap-2 bg-red-500";
                document.getElementById('toast-icon').innerText = "⚠️";
            } else if(type === 'success') {
                toast.className = "fixed bottom-4 right-4 p-4 rounded-xl text-white font-medium shadow-lg transition-all duration-300 transform translate-y-0 opacity-100 z-50 flex items-center gap-2 bg-emerald-500";
                document.getElementById('toast-icon').innerText = "✅";
            } else {
                toast.className = "fixed bottom-4 right-4 p-4 rounded-xl text-white font-medium shadow-lg transition-all duration-300 transform translate-y-0 opacity-100 z-50 flex items-center gap-2 bg-blue-600";
                document.getElementById('toast-icon').innerText = "⏳";
            }
            
            setTimeout(() => {
                toast.classList.remove('translate-y-0', 'opacity-100');
                toast.classList.add('translate-y-20', 'opacity-0');
            }, 3000);
        }

        function showView(viewName) {
            ['config', 'list', 'read', 'edit'].forEach(v => {
                document.getElementById(`view-${v}`).classList.add('hidden');
            });
            document.getElementById(`view-${viewName}`).classList.remove('hidden');

            if (viewName === 'list') fetchList();
            window.scrollTo(0, 0); // Cuộn lên đầu trang
        }

        // --- CẤU HÌNH GITHUB ---
        function getRepoInfo() {
            return {
                repo: localStorage.getItem('gh_repo'),
                token: localStorage.getItem('gh_token')
            };
        }

        function saveConfig() {
            const repo = document.getElementById('cfg-repo').value.trim();
            const token = document.getElementById('cfg-token').value.trim();
            if(!repo || !token) return showToast('Vui lòng nhập đủ thông tin!', 'error');
            
            localStorage.setItem('gh_repo', repo);
            localStorage.setItem('gh_token', token);
            showToast('Đã kết nối thành công!', 'success');
            showView('list');
        }

        // --- API CALLS ---
        async function fetchAPI(endpoint, method = 'GET', body = null) {
            const { repo, token } = getRepoInfo();
            if (!repo || !token) throw new Error("Chưa cấu hình");

            const options = {
                method,
                headers: {
                    'Authorization': `token ${token}`,
                    'Accept': 'application/vnd.github.v3+json',
                    'Content-Type': 'application/json'
                }
            };
            if (body) options.body = JSON.stringify(body);

            const response = await fetch(`https://api.github.com/repos/${repo}/${endpoint}`, options);
            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.message || 'Lỗi API');
            }
            return response.json();
        }

        // --- TẢI DANH SÁCH ---
        async function fetchList() {
            const { repo, token } = getRepoInfo();
            if (!repo || !token) return showView('config');

            document.getElementById('loading-list').classList.remove('hidden');
            document.getElementById('post-grid').innerHTML = '';

            try {
                const data = await fetchAPI('contents/posts');
                allPosts = data.filter(file => file.name.endsWith('.md'));
                renderList(allPosts);
            } catch (error) {
                if (error.message.includes('Not Found')) {
                    // Nếu thư mục posts chưa có thì báo trống
                    allPosts = [];
                    renderList(allPosts);
                } else {
                    showToast('Lỗi tải dữ liệu: ' + error.message, 'error');
                }
            } finally {
                document.getElementById('loading-list').classList.add('hidden');
            }
        }

        function renderList(posts) {
            const grid = document.getElementById('post-grid');
            grid.innerHTML = '';
            
            if(posts.length === 0) {
                grid.innerHTML = `
                    <div class="col-span-full text-center py-16 bg-white rounded-2xl border border-dashed border-slate-300">
                        <div class="text-4xl mb-4">📝</div>
                        <h3 class="text-lg font-bold text-slate-700">Chưa có bài viết nào</h3>
                        <p class="text-slate-500 mb-4">Hãy tạo bài viết đầu tiên để bắt đầu lưu trữ kiến thức.</p>
                        <button onclick="showCreatePost()" class="text-blue-600 font-medium hover:underline">Tạo bài viết ngay</button>
                    </div>`;
                return;
            }

            // Sắp xếp bài mới nhất lên đầu (dựa vào tên file nếu bạn đặt tên có ngày tháng, tạm thời cứ đảo ngược mảng)
            posts.slice().reverse().forEach(post => {
                const title = post.name.replace('.md', '').replace(/-/g, ' '); 
                const card = `
                    <div onclick="openPost('${post.path}', '${post.sha}', '${post.name}')" 
                        class="bg-white rounded-2xl shadow-sm hover:shadow-lg hover:-translate-y-1 transition-all duration-300 p-6 border border-slate-100 cursor-pointer group flex flex-col h-full">
                        <div class="flex-grow">
                            <span class="inline-block bg-blue-50 text-blue-600 text-xs px-2.5 py-1 rounded-md font-semibold mb-4 border border-blue-100">Ghi chú</span>
                            <h2 class="text-xl font-bold text-slate-800 group-hover:text-blue-600 transition-colors capitalize leading-snug">${title}</h2>
                        </div>
                        <div class="mt-4 pt-4 border-t border-slate-50 text-xs text-slate-400 font-mono truncate">
                            📄 ${post.name}
                        </div>
                    </div>
                `;
                grid.innerHTML += card;
            });
        }

        function filterList() {
            const keyword = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allPosts.filter(p => p.name.toLowerCase().includes(keyword));
            renderList(filtered);
        }

        // --- ĐỌC BÀI ---
        async function openPost(path, sha, name) {
            showToast('Đang tải nội dung...');
            try {
                const data = await fetchAPI(`contents/${path}`);
                const contentText = b64_to_utf8(data.content);
                
                currentPost = { path, sha, name, content: contentText };
                
                // Format lại tiêu đề cho đẹp để hiển thị
                const displayTitle = name.replace('.md', '').replace(/-/g, ' ');
                document.getElementById('read-title').innerText = displayTitle.toUpperCase();
                document.getElementById('read-content').innerHTML = marked.parse(contentText);
                
                showView('read');
            } catch (error) {
                showToast('Lỗi tải bài: ' + error.message, 'error');
            }
        }

        // --- SỬA / THÊM ---
        function showEditPost() {
            document.getElementById('edit-filename').value = currentPost.name;
            document.getElementById('edit-filename').disabled = true; // Sửa thì không cho đổi tên file
            document.getElementById('edit-content').value = currentPost.content;
            showView('edit');
        }

        function showCreatePost() {
            currentPost = { path: '', sha: '', name: '', content: '' };
            document.getElementById('edit-filename').value = '';
            document.getElementById('edit-filename').disabled = false;
            document.getElementById('edit-content').value = '';
            showView('edit');
        }

        function cancelEdit() {
            // Nếu đang sửa bài cũ thì quay lại trang đọc, nếu đang tạo bài mới thì quay lại danh sách
            if (currentPost.sha) {
                showView('read');
            } else {
                showView('list');
            }
        }

        async function savePostToGitHub() {
            let filename = document.getElementById('edit-filename').value.trim();
            const content = document.getElementById('edit-content').value;

            // Ràng buộc tên file hợp lệ
            if (!filename) return showToast('Vui lòng nhập tên file!', 'error');
            filename = filename.replace(/\s+/g, '-').toLowerCase(); // Tự động đổi khoảng trắng thành dấu gạch ngang
            if (!filename.endsWith('.md')) filename += '.md';

            const path = currentPost.path || `posts/${filename}`;
            const message = currentPost.sha ? `Cập nhật bài viết: ${filename}` : `Thêm bài viết mới: ${filename}`;

            const bodyData = {
                message: message,
                content: utf8_to_b64(content)
            };
            
            if (currentPost.sha) bodyData.sha = currentPost.sha;

            showToast('Đang lưu lên GitHub...');
            try {
                const result = await fetchAPI(`contents/${path}`, 'PUT', bodyData);
                showToast('Lưu thành công!', 'success');
                
                // Cập nhật state
                currentPost.sha = result.content.sha;
                currentPost.content = content;
                currentPost.name = filename;
                currentPost.path = path;

                // Quay về trang đọc
                const displayTitle = filename.replace('.md', '').replace(/-/g, ' ');
                document.getElementById('read-title').innerText = displayTitle.toUpperCase();
                document.getElementById('read-content').innerHTML = marked.parse(content);
                showView('read');
            } catch (error) {
                showToast('Lỗi khi lưu: ' + error.message, 'error');
            }
        }

        // --- KHỞI CHẠY ---
        window.onload = () => {
            const { repo, token } = getRepoInfo();
            if (repo) document.getElementById('cfg-repo').value = repo;
            if (token) document.getElementById('cfg-token').value = token;

            if (!repo || !token) {
                showView('config');
            } else {
                showView('list');
            }
        };
    </script>
</body>
</html>
